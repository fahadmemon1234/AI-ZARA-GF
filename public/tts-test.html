<!DOCTYPE html>
<html>
<head>
    <title>TTS Test</title>
</head>
<body>
    <h1>ElevenLabs TTS Test</h1>
    <input type="text" id="text" value="Hello, main Zara hoon" style="width: 300px;">
    <button onclick="testTTS()">Test ElevenLabs</button>
    <button onclick="testDirect()">Test Direct Audio</button>
    <div id="result"></div>

    <script>
        async function testTTS() {
            const text = document.getElementById('text').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('/api/speak', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                if (data.audio_base64) {
                    const audio = new Audio('data:audio/mp3;base64,' + data.audio_base64);
                    audio.play();
                    resultDiv.innerHTML += '<p>✅ Playing audio...</p>';
                }
            } catch (e) {
                resultDiv.innerHTML = '<p>❌ Error: ' + e.message + '</p>';
            }
        }

        async function testDirect() {
            const text = document.getElementById('text').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = 'Testing direct...';
            
            try {
                const response = await fetch('https://api.elevenlabs.io/v1/text-to-speech/RmT0JE37YE1NfodnZBnw', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'xi-api-key': '3c99edb9161b96b3c5a72c9316f535eff45b2a64ca7d0cf94e67b2dc86e6f3ce'
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: 'eleven_monolingual_v1',
                        voice_settings: { stability: 0.5, similarity_boost: 0.5 }
                    })
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const audio = new Audio(url);
                    audio.play();
                    resultDiv.innerHTML = '<p>✅ Playing direct audio!</p>';
                } else {
                    const error = await response.text();
                    resultDiv.innerHTML = '<p>❌ Error: ' + error + '</p>';
                }
            } catch (e) {
                resultDiv.innerHTML = '<p>❌ Error: ' + e.message + '</p>';
            }
        }
    </script>
</body>
</html>
